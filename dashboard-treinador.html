<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Treinador - Alfa Academy</title>
    <!-- Use Inter and Space Mono from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: #121212; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 80px; /* space for toast or floating actions */
        }
        .topbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ffc107; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }
        .topbar h2 { 
            margin: 0; 
            color: #ffc107; 
            font-family: 'Anton', sans-serif; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }
        .btn-logout { 
            background: transparent; 
            color: #ffc107; 
            border: 1px solid #ffc107; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.2s;
        }
        .btn-logout:hover {
            background: #ffc107;
            color: #000;
        }
        
        .filters { margin-bottom: 15px; }
        .filters label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #ffc107;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .filters select { 
            width: 100%; 
            padding: 12px; 
            background-color: #1e1e1e; 
            color: #fff; 
            border: 1px solid #333; 
            border-radius: 6px; 
            font-size: 16px; 
        }

        .atleta-card { 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 14px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: border-color 0.15s;
        }
        .atleta-card:hover {
            border-color: #444;
        }
        .atleta-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .atleta-nome { 
            font-weight: 700; 
            font-size: 17px; 
            color: #fff;
        }
        .atleta-posicao { 
            font-size: 11px; 
            color: #aaa; 
            background: #2a2a2a; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .acoes-presenca { 
            display: flex; 
            gap: 8px; 
        }
        .btn-chamada { 
            flex: 1; 
            padding: 12px 6px; 
            border: 2px solid transparent; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.15s; 
            opacity: 0.35; 
            font-family: 'Space Mono', monospace;
            text-align: center;
        }
        .btn-chamada.active { 
            opacity: 1; 
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }
        .btn-presente { background-color: #28a745; color: white; }
        .btn-ausente { background-color: #dc3545; color: white; }
        .btn-justificado { background-color: #ffc107; color: black; }

        .btn-salvar-tudo { 
            width: 100%; 
            padding: 18px; 
            background-color: #ffc107; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            font-size: 16px; 
            text-transform: uppercase; 
            margin-top: 15px; 
            cursor: pointer; 
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.2);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .btn-salvar-tudo:hover {
            background-color: #e0a800;
            transform: translateY(-1px);
        }
        
        /* Expandable configuration section */
        .config-card {
            background-color: #1a1a1c;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }
        .config-title {
            font-family: 'Anton', sans-serif;
            color: #ffc107;
            font-size: 18px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>Chamada do Treinador</h2>
        <div id="topbarActions" style="display:flex; gap:10px; align-items:center;">
            <!-- Injetado dinamicamente -->
        </div>
    </div>

    <!-- Filtro de Categorias -->
    <div class="filters">
        <label for="turmaSelect">Selecione a Categoria (Turma):</label>
        <select id="turmaSelect" onchange="carregarCategoria()">
            <!-- Populated dynamically -->
        </select>
    </div>

    <!-- Filtro de Treinos -->
    <div class="filters">
        <label for="treinoSelect">Selecione o Treino Ativo:</label>
        <select id="treinoSelect" onchange="carregarPresencasTreino()">
            <!-- Populated dynamically -->
        </select>
    </div>

    <!-- Botões de Ação Rápida -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn" style="background:#25D366; color:#111; padding:10px; font-size:12px; border-radius:6px;" onclick="marcarTodosPresentes()">Marcar Todos Presentes</button>
    </div>

    <!-- Container da Lista de Atletas -->
    <div id="listaAtletas">
        <div class="vazio">Selecione uma categoria para começar.</div>
    </div>

    <!-- Ação de salvar chamada -->
    <button class="btn-salvar-tudo" onclick="enviarChamada()">Salvar Chamada do Dia</button>

    <!-- Seção Colapsável de Gestão (Cadastro de Atletas e Treinos) -->
    <div class="config-card">
        <div class="config-title">⚙️ Gestão de Treinos e Atletas</div>
        
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn sec" style="font-size:12px; padding:8px;" onclick="switchConfigTab('atleta')">Cadastrar Atleta</button>
            <button class="btn sec" style="font-size:12px; padding:8px;" onclick="switchConfigTab('treino')">Criar Treino</button>
        </div>

        <!-- Cadastro Atleta -->
        <div id="configAtleta" style="display:block;">
            <div class="field">
                <label class="f" for="jNome">Nome Completo</label>
                <input id="jNome" type="text" placeholder="Nome e sobrenome" maxlength="60">
            </div>
            <div class="field">
                <label class="f" for="jPos">Posição de Jogo</label>
                <select id="jPos">
                    <option value="Goleiro">Goleiro</option>
                    <option value="Zagueiro">Zagueiro</option>
                    <option value="Lateral Esquerdo">Lateral Esquerdo</option>
                    <option value="Lateral Direito">Lateral Direito</option>
                    <option value="Volante">Volante</option>
                    <option value="Meia">Meia</option>
                    <option value="Ponta Esquerda">Ponta Esquerda</option>
                    <option value="Ponta Direita">Ponta Direita</option>
                    <option value="Centroavante">Centroavante</option>
                </select>
            </div>
            <div class="field">
                <label class="f" for="jZap">WhatsApp Contato</label>
                <input id="jZap" type="text" placeholder="11999999999" maxlength="20">
            </div>
            <button class="btn" onclick="cadastrarAtleta()">Cadastrar Novo Atleta</button>
        </div>

        <!-- Criar Treino -->
        <div id="configTreino" style="display:none;">
            <div class="field">
                <label class="f" for="evTitulo">Título do Treino</label>
                <input id="evTitulo" type="text" placeholder="Ex: Treino Tático / Coletivo" maxlength="60">
            </div>
            <div class="field">
                <label class="f" for="evData">Data</label>
                <input id="evData" type="date">
            </div>
            <button class="btn" onclick="criarTreino()">Criar Treino Simples</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = 'https://alfa-api.servicesbr.duckdns.org';
        const CATEGORIAS = ['Sub-10','Sub-11','Sub-12','Sub-13','Sub-14','Sub-15','Sub-16','Sub-17','Sub-20'];
        
        // Session Verification
        const token = localStorage.getItem('alfa_token');
        const profile = localStorage.getItem('alfa_profile');
        const nome = localStorage.getItem('alfa_nome');

        if (!token || (profile !== 'treinador' && profile !== 'admin' && profile !== 'Administrador')) {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        let currentCategory = CATEGORIAS[0];
        let currentAtletas = [];
        let currentTreinos = [];
        let localPresencas = {}; // map of athlete_id -> status

        // Init page
        document.addEventListener('DOMContentLoaded', () => {
            // Populate category select
            const turmaSelect = document.getElementById('turmaSelect');
            turmaSelect.innerHTML = CATEGORIAS.map(c => `<option value="${c}">${c}</option>`).join('');
            
            // Inject Topbar actions
            const actionsDiv = document.getElementById('topbarActions');
            if (profile === 'admin' || profile === 'Administrador') {
                actionsDiv.innerHTML = `
                    <button class="btn-logout" style="border-color:var(--ouro); color:var(--ouro);" onclick="window.location.href='dashboard-admin.html'">Voltar ao Painel Admin</button>
                    <button class="btn-logout" onclick="logout()">Sair</button>
                `;
            } else {
                actionsDiv.innerHTML = `
                    <button class="btn-logout" onclick="logout()">Sair</button>
                `;
            }
            
            carregarCategoria();
        });

        // Toggle subtabs of configuration
        function switchConfigTab(tab) {
            document.getElementById('configAtleta').style.display = tab === 'atleta' ? 'block' : 'none';
            document.getElementById('configTreino').style.display = tab === 'treino' ? 'block' : 'none';
        }

        // Helper Toast
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function carregarCategoria() {
            currentCategory = document.getElementById('turmaSelect').value;
            try {
                // Fetch Atletas
                const resAtletas = await fetch(`${API_BASE_URL}/api/chamada/atletas/${encodeURIComponent(currentCategory)}`, {
                    headers: authHeaders()
                });
                currentAtletas = await resAtletas.json();
                
                // Fetch Treinos (Current Week/Month or general)
                // To list active treinos, we query a wide date range
                const ini = '2026-01-01', fim = '2026-12-31';
                const resTreinos = await fetch(`${API_BASE_URL}/api/treinos?categoria=${encodeURIComponent(currentCategory)}&ini=${ini}&fim=${fim}`, {
                    headers: authHeaders()
                });
                currentTreinos = await resTreinos.json();
                
                // Sort treinos by date descending
                currentTreinos.sort((a, b) => b.data.localeCompare(a.data));

                // Populate treinos select
                const selectT = document.getElementById('treinoSelect');
                if (currentTreinos.length) {
                    selectT.innerHTML = currentTreinos.map(t => `<option value="${t.id}">${t.data.slice(8)}/${t.data.slice(5,7)} - ${t.titulo}</option>`).join('');
                    carregarPresencasTreino();
                } else {
                    selectT.innerHTML = '<option value="">Nenhum treino cadastrado</option>';
                    document.getElementById('listaAtletas').innerHTML = '<div class="vazio"><b>Sem treinos ativos nesta categoria.</b> Crie um treino no menu de gestão abaixo primeiro.</div>';
                }
            } catch(e) {
                console.error(e);
                toast('Erro ao buscar dados do servidor.');
            }
        }

        async function carregarPresencasTreino() {
            const selectT = document.getElementById('treinoSelect');
            const tid = parseInt(selectT.value, 10);
            if (isNaN(tid)) return;

            try {
                const res = await fetch(`${API_BASE_URL}/api/presencas?treino_id=${tid}`, {
                    headers: authHeaders()
                });
                const list = await res.json();
                
                // Reset local presence map
                localPresencas = {};
                list.forEach(item => {
                    if (typeof item === 'number') {
                        localPresencas[item] = 'P'; // retrocompatibilidade
                    } else if (item && typeof item === 'object') {
                        localPresencas[item.atleta_id] = item.status || 'P';
                    }
                });

                renderListaAtletas();
            } catch(e) {
                console.error(e);
                toast('Erro ao obter chamada.');
            }
        }

        function renderListaAtletas() {
            const container = document.getElementById('listaAtletas');
            if (!currentAtletas.length) {
                container.innerHTML = '<div class="vazio">Nenhum atleta cadastrado nesta categoria.</div>';
                return;
            }

            container.innerHTML = currentAtletas.map(a => {
                const status = localPresencas[a.id] || '';
                return `
                <div class="atleta-card" data-id="${a.id}">
                    <div class="atleta-header">
                        <span class="atleta-nome">${a.nome}</span>
                        <span class="atleta-posicao">${a.posicao || 'Sem posição'}</span>
                    </div>
                    <div class="acoes-presenca">
                        <button class="btn-chamada btn-presente ${status === 'P' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'P')">PRESENTE</button>
                        <button class="btn-chamada btn-ausente ${status === 'F' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'F')">AUSENTE</button>
                        <button class="btn-chamada btn-justificado ${status === 'J' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'J')">JUSTIFICADO</button>
                    </div>
                </div>`;
            }).join('');
        }

        function selecionarEstado(btn, aid, status) {
            const parent = btn.closest('.acoes-presenca');
            
            // If already active, click toggles it off (unmarked)
            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                delete localPresencas[aid];
            } else {
                parent.querySelectorAll('.btn-chamada').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localPresencas[aid] = status;
            }
        }

        async function marcarTodosPresentes() {
            if (!currentAtletas.length) {
                toast('Sem atletas na lista.');
                return;
            }
            currentAtletas.forEach(a => {
                localPresencas[a.id] = 'P';
            });
            renderListaAtletas();
            toast('Todos marcados como PRESENTES na fila local.');
        }

        async function enviarChamada() {
            const selectT = document.getElementById('treinoSelect');
            const tid = parseInt(selectT.value, 10);
            if (isNaN(tid)) {
                toast('Selecione ou crie um treino primeiro.');
                return;
            }

            try {
                toast('Enviando presenças para o servidor...');
                // We map all current athletes and push their local status to backend
                await Promise.all(currentAtletas.map(async (a) => {
                    const status = localPresencas[a.id] || null; // null clears presence in backend
                    await fetch(`${API_BASE_URL}/api/presencas`, {
                        method: 'PUT',
                        headers: authHeaders(),
                        body: JSON.stringify({
                            treino_id: tid,
                            atleta_id: a.id,
                            status: status
                        })
                    });
                }));

                toast('CHAMADA SALVA COM SUCESSO NO SERVIDOR!');
                carregarPresencasTreino();
            } catch(e) {
                console.error(e);
                toast('Falha ao sincronizar chamada.');
            }
        }

        async function cadastrarAtleta() {
            const nomeInput = document.getElementById('jNome').value.trim();
            const posicao = document.getElementById('jPos').value;
            const contato = document.getElementById('jZap').value.trim();

            if (nomeInput.length < 2 || nomeInput.length > 60) {
                toast('O nome deve ter entre 2 e 60 caracteres.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/atletas`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        nome: nomeInput,
                        categoria: currentCategory,
                        posicao: posicao,
                        contato: contato
                    })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.erro || 'Erro ao cadastrar.');
                }

                toast('Atleta cadastrado com sucesso!');
                document.getElementById('jNome').value = '';
                document.getElementById('jZap').value = '';
                carregarCategoria();
            } catch(e) {
                toast(e.message || 'Erro ao cadastrar.');
            }
        }

        async function criarTreino() {
            const tituloInput = document.getElementById('evTitulo').value.trim() || 'Treino';
            const dataInput = document.getElementById('evData').value;

            if (!dataInput) {
                toast('Escolha a data do treino.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/treinos`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        titulo: tituloInput,
                        data: dataInput,
                        categoria: currentCategory
                    })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.erro || 'Erro ao criar treino.');
                }

                toast('Treino criado com sucesso!');
                document.getElementById('evTitulo').value = '';
                document.getElementById('evData').value = '';
                carregarCategoria();
            } catch(e) {
                toast(e.message || 'Erro ao criar treino.');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
