<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Treinador - Alfa Academy</title>
    <!-- Anton, Inter, Space Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: #121212; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 80px; 
        }
        .topbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ffc107; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }
        .topbar h2 { 
            margin: 0; 
            color: #ffc107; 
            font-family: 'Anton', sans-serif; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }
        .btn-logout { 
            background: transparent; 
            color: #ffc107; 
            border: 1px solid #ffc107; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.2s;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-logout:hover {
            background: #ffc107;
            color: #000;
        }
        
        .filters { margin-bottom: 20px; }
        .filters label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #ffc107;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .filters select { 
            width: 100%; 
            padding: 12px; 
            background-color: #1e1e1e; 
            color: #fff; 
            border: 1px solid #333; 
            border-radius: 6px; 
            font-size: 16px; 
            height: 48px;
        }

        .atleta-card { 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 14px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .atleta-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .atleta-nome { 
            font-weight: 700; 
            font-size: 17px; 
            color: #fff;
        }
        .atleta-posicao { 
            font-size: 11px; 
            color: #aaa; 
            background: #2a2a2a; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .acoes-presenca { 
            display: flex; 
            gap: 8px; 
        }
        .btn-chamada { 
            flex: 1; 
            padding: 14px 6px; 
            border: 2px solid transparent; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.15s; 
            opacity: 0.35; 
            font-family: 'Space Mono', monospace;
            text-align: center;
            height: 48px;
        }
        .btn-chamada.active { 
            opacity: 1; 
            border-color: #fff;
        }
        .btn-presente { background-color: #28a745; color: white; }
        .btn-ausente { background-color: #dc3545; color: white; }
        .btn-justificado { background-color: #ffc107; color: black; }

        .btn-salvar-tudo { 
            width: 100%; 
            padding: 18px; 
            background-color: #ffc107; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            font-size: 16px; 
            text-transform: uppercase; 
            margin-top: 20px; 
            cursor: pointer; 
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.2);
            font-family: 'Inter', sans-serif;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-salvar-tudo:hover {
            background-color: #e0a800;
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .vazio {
            text-align: center;
            padding: 40px;
            color: var(--cinza);
            border: 1px dashed var(--linha);
            border-radius: var(--radius);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>Lista de Presença</h2>
        <div id="topbarActions" style="display:flex; gap:10px; align-items:center;">
            <!-- Injetado dinamicamente -->
        </div>
    </div>

    <!-- Filtro de Categorias -->
    <div class="filters">
        <label for="turmaSelect">Selecione a Categoria (Turma):</label>
        <select id="turmaSelect" onchange="carregarCategoria()">
            <!-- Populated dynamically -->
        </select>
    </div>

    <!-- Botões de Ação Rápida -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn" style="background:#28a745; color:#fff; padding:10px 16px; font-size:12px; border-radius:6px; height: 38px; border: none; font-weight: 700; cursor: pointer;" onclick="marcarTodosPresentes()">Marcar Todos Presentes</button>
    </div>

    <!-- Container da Lista de Atletas -->
    <div id="listaAtletas">
        <div class="vazio">Selecione uma categoria para começar.</div>
    </div>

    <!-- Ação de salvar chamada -->
    <button class="btn-salvar-tudo" id="btnSalvarChamada" onclick="enviarChamada()">Salvar Chamada do Dia</button>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = 'https://alfa-api.servicesbr.duckdns.org';
        const CATEGORIAS = ['Sub-10','Sub-11','Sub-12','Sub-13','Sub-14','Sub-15','Sub-16','Sub-17','Sub-20'];
        
        // Session Verification
        const token = localStorage.getItem('alfa_token');
        const profile = localStorage.getItem('alfa_profile');
        const nome = localStorage.getItem('alfa_nome');

        if (!token || (profile !== 'treinador' && profile !== 'admin' && profile !== 'Administrador' && profile !== 'Treinador')) {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        let currentCategory = CATEGORIAS[0];
        let currentAtletas = [];
        let localPresencas = {}; // map of athlete_id -> status

        // Init page
        document.addEventListener('DOMContentLoaded', () => {
            // Populate category select
            const turmaSelect = document.getElementById('turmaSelect');
            turmaSelect.innerHTML = CATEGORIAS.map(c => `<option value="${c}">${c}</option>`).join('');
            
            // Inject Topbar actions
            const actionsDiv = document.getElementById('topbarActions');
            if (profile === 'admin' || profile === 'Administrador') {
                actionsDiv.innerHTML = `
                    <button class="btn-logout" style="border-color:var(--ouro); color:var(--ouro);" onclick="window.location.href='dashboard-admin.html'">Voltar ao Painel Admin</button>
                    <button class="btn-logout" onclick="logout()">Sair</button>
                `;
            } else {
                actionsDiv.innerHTML = `
                    <button class="btn-logout" onclick="logout()">Sair</button>
                `;
            }
            
            carregarCategoria();
        });

        // Helper Toast
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function carregarCategoria() {
            currentCategory = document.getElementById('turmaSelect').value;
            try {
                // Fetch Atletas
                const resAtletas = await fetch(`${API_BASE_URL}/api/chamada/atletas/${encodeURIComponent(currentCategory)}`, {
                    headers: authHeaders()
                });
                const resJson = await resAtletas.json();
                currentAtletas = resJson.atletas || [];
                
                // Reset local presence map
                localPresencas = {};
                
                renderListaAtletas();
            } catch(e) {
                console.error(e);
                toast('Erro ao buscar dados do servidor.');
            }
        }

        function renderListaAtletas() {
            const container = document.getElementById('listaAtletas');
            if (!currentAtletas.length) {
                container.innerHTML = '<div class="vazio">Nenhum atleta cadastrado nesta categoria.</div>';
                return;
            }

            container.innerHTML = currentAtletas.map(a => {
                const status = localPresencas[a.id] || '';
                return `
                <div class="atleta-card" data-id="${a.id}">
                    <div class="atleta-header">
                        <span class="atleta-nome">${a.nome}</span>
                        <span class="atleta-posicao">${a.posicao || 'Sem posição'}</span>
                    </div>
                    <div class="acoes-presenca">
                        <button class="btn-chamada btn-presente ${status === 'presente' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'presente')">PRESENTE</button>
                        <button class="btn-chamada btn-ausente ${status === 'ausente' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'ausente')">AUSENTE</button>
                        <button class="btn-chamada btn-justificado ${status === 'justificado' ? 'active' : ''}" onclick="selecionarEstado(this, ${a.id}, 'justificado')">JUSTIFICADO</button>
                    </div>
                </div>`;
            }).join('');
        }

        function selecionarEstado(btn, aid, status) {
            const parent = btn.closest('.acoes-presenca');
            
            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                delete localPresencas[aid];
            } else {
                parent.querySelectorAll('.btn-chamada').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localPresencas[aid] = status;
            }
        }

        async function marcarTodosPresentes() {
            if (!currentAtletas.length) {
                toast('Sem atletas na lista.');
                return;
            }
            currentAtletas.forEach(a => {
                localPresencas[a.id] = 'presente';
            });
            renderListaAtletas();
            toast('Todos marcados como presente!');
        }

        async function enviarChamada() {
            if (!currentAtletas.length) {
                toast('Nenhum atleta listado.');
                return;
            }
            
            const btn = document.getElementById('btnSalvarChamada');
            
            try {
                btn.classList.add('btn-loading');
                toast('Salvando chamada...');
                
                // Map localPresencas to backend array, default to 'ausente' if not selected
                const chamadaPayload = currentAtletas.map(a => ({
                    atleta_id: a.id,
                    status: localPresencas[a.id] || 'ausente'
                }));
                
                const res = await fetch(`${API_BASE_URL}/api/chamada/salvar`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ chamada: chamadaPayload })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.erro || 'Falha ao salvar chamada.');
                }

                toast('CHAMADA REGISTRADA COM SUCESSO!');
            } catch(e) {
                console.error(e);
                toast(e.message || 'Falha ao sincronizar chamada.');
            } finally {
                btn.classList.remove('btn-loading');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
