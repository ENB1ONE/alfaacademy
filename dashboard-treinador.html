<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel do Treinador - Alfa Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <!-- Navbar Mobile-First -->
    <nav class="mobile-nav">
        <div class="nav-brand">
            <img src="logo.png" alt="Alfa Academy" onerror="this.src='https://via.placeholder.com/40x40?text=ALFA'">
            <div class="nav-brand-text">
                <span class="n">Alfa Academy</span>
                <span class="p">Coach CRM</span>
            </div>
        </div>
        <div class="nav-actions" id="topbarActions">
            <!-- Injetado dinamicamente -->
        </div>
    </nav>

    <!-- Content Area -->
    <main class="coach-container">
        
        <!-- HEADER DO DIA -->
        <header class="day-header">
            <h1 id="diaAtual">Hoje</h1>
            <p>Selecione a sessão de treino para realizar a chamada.</p>
        </header>

        <!-- VIEW 1: SELEÇÃO DE SESSÃO DE TREINO -->
        <div id="viewSessoes" class="view-active">
            <div class="sessoes-grid" id="sessoesContainer">
                <!-- Cards injetados via JS -->
            </div>
        </div>

        <!-- VIEW 2: LISTA DE CHAMADA -->
        <div id="viewChamada" class="view-hidden">
            <div class="chamada-header">
                <button class="btn-voltar" onclick="voltarSessoes()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
                <h2 id="tituloSessaoAtual">Sessão Sub-15</h2>
            </div>
            
            <div class="chamada-acoes">
                <button class="btn-all-present" onclick="marcarTodosPresentes()">
                    <i class="fas fa-check-double"></i> Marcar Todos Presentes
                </button>
            </div>

            <div class="lista-atletas-crm" id="listaAtletas">
                <!-- Atletas injetados via JS -->
            </div>

            <!-- Floating Action Button para Salvar -->
            <button class="fab-salvar" id="btnSalvarChamada" onclick="enviarChamada()">
                <i class="fas fa-save"></i> SALVAR CHAMADA
            </button>
        </div>

    </main>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = 'https://alfa-api.servicesbr.duckdns.org';
        const CATEGORIAS = ['Sub-10','Sub-11','Sub-12','Sub-13','Sub-14','Sub-15','Sub-16','Sub-17','Sub-20'];
        
        // Verificação de Sessão
        const token = localStorage.getItem('alfa_token');
        const profile = localStorage.getItem('alfa_profile');
        const nome = localStorage.getItem('alfa_nome');

        if (!token || (profile !== 'treinador' && profile !== 'admin' && profile !== 'Administrador' && profile !== 'Treinador')) {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        let currentCategory = null;
        let currentAtletas = [];
        let localPresencas = {}; // map de id do atleta -> status

        document.addEventListener('DOMContentLoaded', () => {
            configurarData();
            configurarNavbar();
            renderSessoes();
        });

        function configurarData() {
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dataStr = new Date().toLocaleDateString('pt-BR', opcoes);
            document.getElementById('diaAtual').innerText = dataStr.charAt(0).toUpperCase() + dataStr.slice(1);
        }

        function configurarNavbar() {
            const actionsDiv = document.getElementById('topbarActions');
            let html = '';
            if (profile === 'admin' || profile === 'Administrador') {
                html += <button class="btn-nav-icon" onclick="window.location.href='dashboard-admin.html'" title="Painel Admin"><i class="fas fa-shield-alt"></i></button>;
            }
            html += <button class="btn-nav-icon" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>;
            actionsDiv.innerHTML = html;
        }

        // VIEW 1: Renderizar Cards de Sessões
        function renderSessoes() {
            const container = document.getElementById('sessoesContainer');
            container.innerHTML = CATEGORIAS.map(cat => 
                <div class="sessao-card" onclick="abrirSessao('')">
                    <div class="sessao-icon"><i class="fas fa-futbol"></i></div>
                    <div class="sessao-info">
                        <h3>Treino </h3>
                        <p>Toque para iniciar chamada</p>
                    </div>
                    <div class="sessao-arrow"><i class="fas fa-chevron-right"></i></div>
                </div>
            ).join('');
        }

        function voltarSessoes() {
            document.getElementById('viewChamada').className = 'view-hidden';
            document.getElementById('viewSessoes').className = 'view-active';
            currentCategory = null;
        }

        // VIEW 2: Abrir Chamada de uma Sessão
        async function abrirSessao(categoria) {
            currentCategory = categoria;
            document.getElementById('tituloSessaoAtual').innerText = \Treino \\;
            
            document.getElementById('viewSessoes').className = 'view-hidden';
            document.getElementById('viewChamada').className = 'view-active';
            
            document.getElementById('listaAtletas').innerHTML = '<div class="carregando"><i class="fas fa-spinner fa-spin"></i> Carregando atletas...</div>';
            
            try {
                const res = await fetch(\\/api/chamada/atletas/\\, {
                    headers: { 'Authorization': \Bearer \\ }
                });
                const resJson = await res.json();
                currentAtletas = resJson.atletas || [];
                localPresencas = {}; // Resetar presenças locais ao abrir
                
                renderListaAtletas();
            } catch(e) {
                console.error(e);
                toast('Erro ao carregar atletas. Tente novamente.');
                voltarSessoes();
            }
        }

        function renderListaAtletas() {
            const container = document.getElementById('listaAtletas');
            if (!currentAtletas.length) {
                container.innerHTML = '<div class="vazio">Nenhum atleta cadastrado nesta categoria.</div>';
                return;
            }

            container.innerHTML = currentAtletas.map(a => {
                const status = localPresencas[a.id] || '';
                // Definir iniciais para o avatar
                const iniciais = a.nome.substring(0, 2).toUpperCase();
                
                return \
                <div class="crm-atleta-card" data-id="\">
                    <div class="crm-atleta-info">
                        <div class="crm-avatar">\</div>
                        <div class="crm-detalhes">
                            <h4>\</h4>
                            <span>\</span>
                        </div>
                    </div>
                    <div class="crm-acoes">
                        <div class="crm-btn-group">
                            <button class="crm-btn presente \" onclick="selecionarEstado(this, \, 'presente')">
                                <i class="fas fa-check"></i>
                            </button>
                            <button class="crm-btn ausente \" onclick="selecionarEstado(this, \, 'ausente')">
                                <i class="fas fa-times"></i>
                            </button>
                            <button class="crm-btn justificado \" onclick="selecionarEstado(this, \, 'justificado')">
                                <i class="fas fa-briefcase-medical"></i>
                            </button>
                        </div>
                        <div class="crm-status-label">
                            \
                        </div>
                    </div>
                </div>\;
            }).join('');
        }

        function selecionarEstado(btn, aid, status) {
            const card = btn.closest('.crm-atleta-card');
            const group = card.querySelector('.crm-btn-group');
            const label = card.querySelector('.crm-status-label');
            
            // Se clicar no já ativo, desmarca
            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                delete localPresencas[aid];
                label.innerText = 'Pendente';
                label.style.color = 'var(--cinza)';
            } else {
                group.querySelectorAll('.crm-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localPresencas[aid] = status;
                
                if (status === 'presente') {
                    label.innerText = 'Presente';
                    label.style.color = '#28a745';
                } else if (status === 'ausente') {
                    label.innerText = 'Ausente';
                    label.style.color = '#dc3545';
                } else {
                    label.innerText = 'DM / Justif.';
                    label.style.color = '#f8c146';
                }
            }
        }

        function marcarTodosPresentes() {
            if (!currentAtletas.length) return;
            currentAtletas.forEach(a => {
                localPresencas[a.id] = 'presente';
            });
            renderListaAtletas();
            toast('Todos marcados como presente!');
        }

        async function enviarChamada() {
            if (!currentAtletas.length) {
                toast('Nenhum atleta na lista.');
                return;
            }
            
            const btn = document.getElementById('btnSalvarChamada');
            
            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SALVANDO...';
                btn.style.opacity = '0.7';
                btn.disabled = true;
                
                // Tratar quem não foi clicado como 'ausente' por padrão (opcional) ou não enviar
                const chamadaPayload = currentAtletas.map(a => ({
                    atleta_id: a.id,
                    status: localPresencas[a.id] || 'ausente'
                }));
                
                const res = await fetch(\\/api/chamada/salvar\, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': \Bearer \\
                    },
                    body: JSON.stringify({ chamada: chamadaPayload })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.erro || 'Falha ao salvar chamada.');
                }

                toast('CHAMADA SALVA COM SUCESSO!');
                setTimeout(() => voltarSessoes(), 1500);

            } catch(e) {
                console.error(e);
                toast(e.message || 'Falha ao sincronizar chamada.');
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> SALVAR CHAMADA';
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
