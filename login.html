<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alfa Academy</title>
    <!-- Mantenha o link para o CSS global do projeto -->
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Anton', 'Inter', sans-serif;
        }
        .login-wrapper {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .login-header {
            text-align: center;
            color: #ffc107;
            margin-bottom: 30px;
        }
        .login-header h2 { margin: 0; text-transform: uppercase; }
        .login-header p { color: #aaa; font-size: 12px; font-family: 'Inter', sans-serif; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; color: #ffc107; font-size: 12px; margin-bottom: 5px; text-transform: uppercase;
        }
        .form-group input {
            width: 100%; padding: 12px; background-color: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;
        }
        .btn-submit {
            width: 100%; padding: 14px; background-color: #ffc107; color: #000; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-submit:hover { background-color: #e0a800; }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <h2>ÁREA RESTRITA</h2>
            <p>Gerenciamento do Centro de Formação</p>
        </div>
        <form id="authForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-submit">Entrar no Painel</button>
            <div id="loginError" class="error-msg">Credenciais inválidas.</div>
        </form>
    </div>

    <!-- Modal de Forçar Troca de Senha -->
    <div class="modal-overlay" id="changePasswordModal" style="display:none;">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Segurança da Conta</h3>
          <p>Defina sua nova senha definitiva</p>
        </div>
        <div class="modal-body">
          <div class="field">
            <label class="f" for="newPasswordInput">Nova Senha Definitiva</label>
            <input id="newPasswordInput" type="password" placeholder="Digite sua nova senha" autocomplete="new-password">
          </div>
          <div class="login-err" id="changePasswordErr" style="margin-bottom:12px;"></div>
          <button class="btn" onclick="salvarNovaSenha()">Definir Senha e Entrar</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
</body>
</html>
